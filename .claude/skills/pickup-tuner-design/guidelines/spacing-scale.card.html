<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base — a tight faceplate grid for one dense panel" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--grad-plate); color: var(--text-primary);
         font-family: var(--font-ui); padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { text-align: center; }
  .bar { background: var(--brass); border-radius: 2px; width: 26px; border: 1px solid var(--brass-deep); }
  .tok { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); margin-top: 8px; }
  .px { font-family: var(--font-mono); font-size: var(--text-micro); color: var(--text-disabled); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="tok">1</div><div class="px">4</div></div>
    <div class="item"><div class="bar" style="height:6px"></div><div class="tok">2</div><div class="px">6</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="tok">3</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="height:10px"></div><div class="tok">4</div><div class="px">10</div></div>
    <div class="item"><div class="bar" style="height:13px"></div><div class="tok">5</div><div class="px">13</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="tok">6</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="height:22px"></div><div class="tok">7</div><div class="px">22</div></div>
    <div class="item"><div class="bar" style="height:26px"></div><div class="tok">8</div><div class="px">26</div></div>
  </div>
</body>
</html>
