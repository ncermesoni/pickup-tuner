<!-- @dsCard group="Type" viewport="700x190" name="Tuner note — Spectral" subtitle="Warm serif, 50px — the one engraved-dial moment in the app" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--grad-dial); font-family: var(--font-ui);
         padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; height: 142px; }
  .note { font: var(--type-display); color: var(--ink-strong); }
  .note span { font-size: 26px; opacity: .55; }
  .sub { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); }
  .meta { font: var(--type-caption); color: var(--text-muted); letter-spacing: var(--tracking-label);
          text-transform: uppercase; margin-top: 10px; }
</style>
</head>
<body>
  <div class="note">A<span>2</span></div>
  <div class="sub">&minus;1 cents &middot; 109.9 Hz</div>
  <div class="meta">Spectral &middot; 50px &middot; serif</div>
</body>
</html>
