<!-- @dsCard group="Type" viewport="700x240" name="Faceplate lettering — Oswald" subtitle="Condensed grotesque for titles, captions, labels, row names" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--grad-plate); color: var(--text-primary);
         font-family: var(--font-ui); padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 15px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .meta { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); margin-left: auto; }
  .heading { font: var(--type-heading); }
  .title { font: var(--type-title); }
  .body { font: var(--type-body); }
  .label { font: var(--type-label); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="heading">Audio &mdash; panel heading</span><span class="meta">17 / 600</span></div>
    <div class="line"><span class="title">Pickup Tuner &mdash; app title</span><span class="meta">15 / 600</span></div>
    <div class="line"><span class="body">Pluck the string and let the note ring &mdash; body</span><span class="meta">14 / 400</span></div>
    <div class="line"><span class="label">balanced within &plusmn; dB &mdash; control label</span><span class="meta">13 / 500</span></div>
  </div>
</body>
</html>
