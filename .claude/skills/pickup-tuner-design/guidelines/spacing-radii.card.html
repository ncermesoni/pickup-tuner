<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="Machined — cells/buttons, panel/dial, whole chassis" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--grad-plate); color: var(--text-primary);
         font-family: var(--font-ui); padding: 24px; }
  .row { display: flex; gap: 28px; }
  .item { text-align: center; }
  .b { width: 96px; height: 56px; background: var(--surface-control);
       border: 1px solid var(--plate-edge); box-shadow: var(--shadow-btn); }
  .tok { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); margin-top: 10px; }
  .use { font-size: var(--text-xs); color: var(--text-disabled); margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="b" style="border-radius: var(--radius-sm)"></div><div class="tok">sm &middot; 4px</div><div class="use">cells, buttons</div></div>
    <div class="item"><div class="b" style="border-radius: var(--radius-md)"></div><div class="tok">md &middot; 6px</div><div class="use">panel, dial</div></div>
    <div class="item"><div class="b" style="border-radius: var(--radius-lg)"></div><div class="tok">lg &middot; 10px</div><div class="use">whole chassis</div></div>
  </div>
</body>
</html>
