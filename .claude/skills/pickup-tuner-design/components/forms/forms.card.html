<!-- @dsCard group="Components" viewport="700x300" name="Forms" subtitle="Button, segmented toggle, select, slider, checkbox, text field, stepper" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--grad-chassis); color: var(--text-primary);
         font-family: var(--font-ui); padding: 24px; }
  .grid { display: flex; flex-direction: column; gap: 18px;
          background: var(--grad-plate); border: 1px solid var(--plate-edge);
          box-shadow: var(--shadow-plate); border-radius: var(--radius-md); padding: 20px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .cap { font: var(--type-caption); color: var(--text-muted);
         letter-spacing: var(--tracking-label); text-transform: uppercase;
         width: 96px; flex: none; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, SegmentedToggle, Select, Slider, Checkbox, TextField, Stepper } =
      window.PickupTunerDesignSystem_dfbad4;

    function Demo() {
      const [metric, setMetric] = React.useState("RMS");
      const [driver, setDriver] = React.useState("ASIO");
      const [gain, setGain] = React.useState(-6);
      const [mute, setMute] = React.useState(false);
      const [name, setName] = React.useState("Bridge");
      const [strings, setStrings] = React.useState(6);

      return (
        <div className="grid">
          <div className="row">
            <span className="cap">Button</span>
            <Button onClick={() => {}}>Arm capture (Space)</Button>
            <Button size="small">Reset hold</Button>
            <Button tone="amber">Reconnect</Button>
            <Button disabled>Clear all</Button>
          </div>
          <div className="row">
            <span className="cap">Toggle</span>
            <SegmentedToggle options={["RMS", "Peak"]} value={metric} onChange={setMetric} />
            <span className="cap">Select</span>
            <Select label="Driver" value={driver} options={["ASIO", "Windows Audio", "DirectSound"]} onChange={setDriver} />
          </div>
          <div className="row">
            <span className="cap">Slider</span>
            <div style={{ width: 240 }}>
              <Slider value={gain} min={-60} max={6} label="gain (dB)" onChange={setGain} />
            </div>
            <Checkbox checked={mute} label="Mute" onChange={setMute} />
          </div>
          <div className="row">
            <span className="cap">Field</span>
            <TextField value={name} onChange={setName} width={120} />
            <Stepper label="strings:" value={strings} min={4} max={12} onChange={setStrings} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
