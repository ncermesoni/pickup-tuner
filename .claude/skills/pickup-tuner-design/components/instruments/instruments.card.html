<!-- @dsCard group="Components" viewport="700x440" name="Instruments" subtitle="VU level meter, centered-needle tuner, and capture-grid cells" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--grad-chassis); color: var(--text-primary);
         font-family: var(--font-ui); padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { background: var(--grad-plate); border: 1px solid var(--plate-edge);
           box-shadow: var(--shadow-plate); border-radius: var(--radius-md); padding: var(--space-5); }
  .cap { font: var(--type-caption); color: var(--text-muted);
         letter-spacing: var(--tracking-label); text-transform: uppercase;
         display: block; margin-bottom: 10px; }
  .cells { display: flex; gap: var(--grid-gap); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Meter, Tuner, GridCell } = window.PickupTunerDesignSystem_dfbad4;

    function Demo() {
      return (
        <div className="stack">
          <div className="panel">
            <span className="cap">Level</span>
            <Meter peak={-6.4} hold={-3.1} rms={-14.2} />
          </div>
          <div className="two">
            <div className="panel">
              <span className="cap">Tuner</span>
              <Tuner reading={{ name: "A", octave: 2, cents: -1, frequency: 109.9 }} />
            </div>
            <div className="panel">
              <span className="cap">Capture cells</span>
              <div className="cells">
                <GridCell delta={0.2} level={-14.2} />
                <GridCell delta={-1.5} level={-15.7} />
                <GridCell delta={3.2} level={-11.0} clipped />
                <GridCell level={null} target />
                <GridCell level={null} />
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
